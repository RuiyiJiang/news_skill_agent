<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资讯聚合平台</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="sidebar-top">
            <h1 class="logo">资讯聚合</h1>

            <div class="update-time" id="updated-at">
                加载中...
            </div>
        </div>

        <nav class="nav">

            <a class="nav-link active" data-label="">
                <i class="bi bi-house"></i>
                首页
            </a>

            <div class="nav-group-title">
                资讯分组
            </div>

            <div id="label-nav"></div>

        </nav>

    </aside>

    <!-- Main -->
    <main class="main">

        <!-- Topbar -->
        <div class="topbar">

            <div class="search-box">
                <i class="bi bi-search"></i>
                <input
                    type="text"
                    id="query-input"
                    placeholder="搜索资讯..."
                >
            </div>

            <select id="source-select">
                <option value="">所有来源</option>
            </select>

        </div>

        <!-- Header -->
        <div class="page-header">

            <h2 id="section-title">
                全部资讯
            </h2>

            <div class="count">
                <span id="total-count">0</span>
                条资讯
            </div>

        </div>

        <!-- News -->
        <div id="news-list"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>

    </main>

</div>

<script>

const ITEMS_PER_PAGE = 20;

const state = {
    manifest: null,
    datasets: {
        all: [],
        filtered: []
    },

    currentDataset: "filtered",

    filters: {
        query: "",
        source: "",
        label: ""
    },

    page: 1
};

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function formatUpdatedAt(isoString) {
    if (!isoString) return "暂无数据";

    const date = new Date(isoString);

    if (Number.isNaN(date.getTime())) {
        return isoString;
    }

    return date.toLocaleString("zh-CN", {
        hour12: false
    });
}

function getActiveItems() {
    return state.datasets[state.currentDataset] || [];
}

function applyFilters(items) {

    const query =
        state.filters.query.trim().toLowerCase();

    const source =
        state.filters.source.trim().toLowerCase();

    const label =
        state.filters.label.trim().toLowerCase();

    return items.filter(item => {

        if (query) {

            const haystack =
                `${item.title || ""}
                 ${item.summary || ""}
                 ${item.foreign_summary || ""}`
                .toLowerCase();

            if (!haystack.includes(query)) {
                return false;
            }
        }

        if (
            source &&
            !(item.source || "")
            .toLowerCase()
            .includes(source)
        ) {
            return false;
        }

        if (
            label &&
            !(item.label || "")
            .toLowerCase()
            .includes(label)
        ) {
            return false;
        }

        return true;
    });
}

function populateSidebar(items) {

    const nav = document.getElementById("label-nav");

    const labels = [
        ...new Set(
            items.map(item => item.label)
            .filter(Boolean)
        )
    ].sort();

    nav.innerHTML = labels.map(label => `
        <a class="nav-link"
           data-label="${escapeHtml(label)}">

            <i class="bi bi-folder2"></i>

            ${escapeHtml(label)}
        </a>
    `).join("");

    document.querySelectorAll(".nav-link")
        .forEach(link => {

            link.addEventListener("click", () => {

                document.querySelectorAll(".nav-link")
                    .forEach(el => {
                        el.classList.remove("active");
                    });

                link.classList.add("active");

                state.filters.label =
                    link.dataset.label || "";

                document.getElementById(
                    "section-title"
                ).textContent =
                    state.filters.label || "全部资讯";

                state.page = 1;

                render();
            });

        });
}

function populateSourceSelect(items) {

    const sourceSelect =
        document.getElementById("source-select");

    const sources = [
        ...new Set(
            items.map(item => item.source)
            .filter(Boolean)
        )
    ].sort();

    sourceSelect.innerHTML =
        `<option value="">所有来源</option>` +
        sources.map(src => `
            <option value="${escapeHtml(src)}">
                ${escapeHtml(src)}
            </option>
        `).join("");
}

function renderItem(item) {

    const url = item.url || "#";

    const published =
        item.published_at ||
        item.raw_date_text ||
        "未知时间";

    return `
        <article class="news-card">

            <div class="news-meta">

                <span>${escapeHtml(item.source || "未知来源")}</span>

                <span>·</span>

                <span>${escapeHtml(published)}</span>

            </div>

            <h3 class="news-title">

                <a href="${escapeHtml(url)}"
                   target="_blank">

                    ${escapeHtml(item.title)}

                </a>

            </h3>

            ${
                item.summary
                ? `
                    <p class="news-summary">
                        ${escapeHtml(item.summary)}
                    </p>
                `
                : ""
            }

        </article>
    `;
}

function renderPagination(totalPages) {

    const container =
        document.getElementById("pagination");

    if (totalPages <= 1) {
        container.innerHTML = "";
        return;
    }

    let html = "";

    for (
        let page = 1;
        page <= totalPages;
        page++
    ) {

        html += `
            <button
                class="page-btn
                ${page === state.page ? "active" : ""}"
                data-page="${page}">
                ${page}
            </button>
        `;
    }

    container.innerHTML = html;

    container.querySelectorAll(".page-btn")
        .forEach(btn => {

            btn.addEventListener("click", () => {

                state.page =
                    Number(btn.dataset.page);

                render();

                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });

            });

        });
}

function render() {

    const items =
        applyFilters(getActiveItems());

    const totalItems = items.length;

    const totalPages =
        Math.max(
            1,
            Math.ceil(totalItems / ITEMS_PER_PAGE)
        );

    const start =
        (state.page - 1) * ITEMS_PER_PAGE;

    const pageItems =
        items.slice(
            start,
            start + ITEMS_PER_PAGE
        );

    document.getElementById(
        "total-count"
    ).textContent = totalItems;

    const list =
        document.getElementById("news-list");

    if (!pageItems.length) {

        list.innerHTML = `
            <div class="empty">
                暂无数据
            </div>
        `;

    } else {

        list.innerHTML =
            pageItems.map(renderItem).join("");
    }

    renderPagination(totalPages);
}

async function loadData() {

    const [
        manifestRes,
        allRes,
        filteredRes
    ] = await Promise.all([
        fetch("./data/manifest.json"),
        fetch("./data/all.json"),
        fetch("./data/filtered.json")
    ]);

    state.manifest =
        await manifestRes.json();

    state.datasets.all =
        await allRes.json();

    state.datasets.filtered =
        await filteredRes.json();

    document.getElementById(
        "updated-at"
    ).textContent =
        "最后更新：" +
        formatUpdatedAt(
            state.manifest.generated_at
        );

    populateSidebar(getActiveItems());

    populateSourceSelect(getActiveItems());

    render();
}

document.getElementById("query-input")
    .addEventListener("input", e => {

        state.filters.query = e.target.value;

        state.page = 1;

        render();
    });

document.getElementById("source-select")
    .addEventListener("change", e => {

        state.filters.source = e.target.value;

        state.page = 1;

        render();
    });

loadData();

</script>

</body>
</html>

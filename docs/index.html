<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资讯提取聚合平台界面</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="./assets/css/style.css" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- aside：侧边内容区域 -->
    <aside class="sidebar">

        <!-- 导航栏顶部标题 -->
        <div class="sidebar-top">
            <h1 class="logo">资讯提取聚合</h1>

            <div class="update-time" id="updated-at">
                加载中...
            </div>
        </div>

        <!-- 导航栏模块 -->
        <nav class="nav">

            <a class="nav-link active" data-label="">
                <i class="bi bi-house"></i>
                首页
            </a>

            <!-- 资讯分组的标题 -->
            <div class="nav-group-title">
                资讯分组
            </div>

            <!-- 资讯分组每一组的链接栏 -->
            <div id="label-nav"></div>

        </nav>

    </aside>

    <!-- main右侧：主要内容区域 -->
    <main class="main">

        <!-- Topbar -->
        <div class="topbar">

            <div class="search-box">
                <i class="bi bi-search"></i>
                <input
                    type="text"
                    id="query-input"
                    placeholder="搜索资讯..."
                >
            </div>

            <select id="source-select">
                <option value="">所有来源</option>
            </select>

        </div>

        <!-- Header -->
        <div class="page-header">

            <h2 id="section-title">
                全部资讯
            </h2>

            <div class="count">
                <span id="total-count">0</span>
                条资讯
            </div>

        </div>

        <!-- News -->
        <div id="news-list"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>

    </main>

</div>

<script>

const ITEMS_PER_PAGE = 20;
const CONTENT_PREVIEW_LENGTH = 100; // 超过此字数折叠

const state = {
    manifest: null,
    datasets: {
        all: [],
        filtered: []
    },

    currentDataset: "filtered",

    filters: {
        query: "",
        source: "",
        label: ""
    },

    page: 1,

    // Track expanded states
    expandedItems: new Set(),

    // Track generated summaries
    generatedSummaries: new Map()
};

function escapeHtml(value) {
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

function formatUpdatedAt(isoString) {
    if (!isoString) return "暂无数据";

    const date = new Date(isoString);

    if (Number.isNaN(date.getTime())) {
        return isoString;
    }

    return date.toLocaleString("zh-CN", {
        hour12: false
    });
}

function getActiveItems() {
    return state.datasets[state.currentDataset] || [];
}

function applyFilters(items) {

    const query =
        state.filters.query.trim().toLowerCase();

    const source =
        state.filters.source.trim().toLowerCase();

    const label =
        state.filters.label.trim().toLowerCase();

    return items.filter(item => {

        if (query) {

            const haystack =
                `${item.title || ""}
                 ${item.summary || ""}
                 ${item.foreign_summary || ""}
                 ${item.chinese_translation || ""}
                 ${item.content || ""}`
                .toLowerCase();

            if (!haystack.includes(query)) {
                return false;
            }
        }

        if (
            source &&
            !(item.source || "")
            .toLowerCase()
            .includes(source)
        ) {
            return false;
        }

        if (
            label &&
            !(item.label || "")
            .toLowerCase()
            .includes(label)
        ) {
            return false;
        }

        return true;
    });
}


// items数据填充侧边栏
function populateSidebar(items) {

    /*

        1.去重并排序
        2.生成 HTML 导航菜单
        3.插入到页面中
        4.给每个菜单绑定点击事件
        5.点击后切换 active 状态
        6.更新筛选条件
        7.重新渲染页面

     */

    // 找到id为label-nav的元素
    const nav = document.getElementById("label-nav");

    // 提取所有label，这里需要注意LLM生成的label不稳定，是否作为导航栏存疑
    const labels = [
        // new Set方法用于去重，...是展开运算符，把Set重新变回数组
        ...new Set(
            items.map(item => item.label)
            // 删除空值，对于源数据意义不大
            .filter(Boolean)
        )
        // sort方法用于排序数组
    ].sort();

    // 根据label动态生成html
    nav.innerHTML = labels.map(label => `
        <a class="nav-link"
           data-label="${escapeHtml(label)}">

            <i class="bi bi-folder2"></i>

            ${escapeHtml(label)}
        </a>
    `).join("");

    document.querySelectorAll(".nav-link")
        .forEach(link => {

            link.addEventListener("click", () => {

                document.querySelectorAll(".nav-link")
                    .forEach(el => {
                        el.classList.remove("active");
                    });

                link.classList.add("active");

                state.filters.label =
                    link.dataset.label || "";

                document.getElementById(
                    "section-title"
                ).textContent =
                    state.filters.label || "全部资讯";

                state.page = 1;

                render();
            });

        });
}

function populateSourceSelect(items) {

    const sourceSelect =
        document.getElementById("source-select");

    const sources = [
        ...new Set(
            items.map(item => item.source)
            .filter(Boolean)
        )
    ].sort();

    sourceSelect.innerHTML =
        `<option value="">所有来源</option>` +
        sources.map(src => `
            <option value="${escapeHtml(src)}">
                ${escapeHtml(src)}
            </option>
        `).join("");
}

function renderContent(item, itemId) {
    const content = item.content || "";
    const summary = item.summary || "";

    if (!content && !summary) {
        return `
            <div class="news-content-wrapper">
                <p class="news-no-content">暂无内容</p>
            </div>
        `;
    }

    const isExpanded = state.expandedItems.has(itemId);
    const hasSummary = summary && summary.trim();

    // If there's a pre-generated summary, show it
    let summaryHtml = "";
    if (hasSummary) {
        summaryHtml = `
            <div class="news-summary-section">
                <span class="summary-label">摘要：</span>
                <span class="summary-text">${escapeHtml(summary)}</span>
            </div>
        `;
    }

    // Show generated summary if exists
    const generatedSummary = state.generatedSummaries.get(itemId);
    let generatedSummaryHtml = "";
    if (generatedSummary) {
        generatedSummaryHtml = `
            <div class="news-generated-summary">
                <span class="generated-label">LLM生成摘要：</span>
                <span class="generated-text">${escapeHtml(generatedSummary)}</span>
            </div>
        `;
    }

    // Content display logic
    const shouldFold = content.length > CONTENT_PREVIEW_LENGTH && !isExpanded;
    const displayContent = shouldFold
        ? content.substring(0, CONTENT_PREVIEW_LENGTH) + "..."
        : content;

    const expandBtn = content.length > CONTENT_PREVIEW_LENGTH
        ? `
            <button class="expand-btn" data-item-id="${itemId}">
                ${isExpanded ? '收起全文' : '展开全文'}
                <i class="bi bi-chevron-${isExpanded ? 'up' : 'down'}"></i>
            </button>
        `
        : "";

    return `
        <div class="news-content-wrapper">
            ${summaryHtml}
            ${generatedSummaryHtml}
            <div class="news-full-content ${shouldFold ? 'folded' : ''}">
                <div class="content-text">${escapeHtml(displayContent)}</div>
                ${expandBtn}
            </div>
            <button class="llm-summary-btn" data-item-id="${itemId}" ${!content ? 'disabled' : ''}>
                <i class="bi bi-magic"></i>
                LLM生成摘要
            </button>
        </div>
    `;
}

function renderItem(item, index) {

    const url = item.url || "#";

    const published =
        item.published_at ||
        item.raw_date_text ||
        "未知时间";

    const hasTranslation =
        item.chinese_translation &&
        item.chinese_translation.trim();

    const itemId = `item-${state.page}-${index}`;

    return `
        <article class="news-card" id="${itemId}">

            <div class="news-meta">

                <span>${escapeHtml(item.source || "未知来源")}</span>

                <span>·</span>

                <span>${escapeHtml(published)}</span>

            </div>

            <h3 class="news-title">

                <a href="${escapeHtml(url)}"
                   target="_blank">

                    ${escapeHtml(item.title)}

                </a>

            </h3>

            ${
                hasTranslation
                ? `
                    <p class="news-subtitle">
                        ${escapeHtml(item.chinese_translation)}
                    </p>
                `
                : ""
            }

            ${renderContent(item, itemId)}

            ${
                hasTranslation && item.foreign_summary
                ? `
                    <p class="news-foreign-summary">
                        ${escapeHtml(item.foreign_summary)}
                    </p>
                `
                : ""
            }

        </article>
    `;
}

function bindContentEvents() {
    // Bind expand/collapse buttons
    document.querySelectorAll('.expand-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const itemId = e.currentTarget.dataset.itemId;
            if (state.expandedItems.has(itemId)) {
                state.expandedItems.delete(itemId);
            } else {
                state.expandedItems.add(itemId);
            }
            render();
        });
    });

    // Bind LLM summary buttons
    document.querySelectorAll('.llm-summary-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            const itemId = e.currentTarget.dataset.itemId;
            await generateSummary(itemId);
        });
    });
}

async function generateSummary(itemId) {
    const btn = document.querySelector(`.llm-summary-btn[data-item-id="${itemId}"]`);
    if (!btn) return;

    // Find the item
    const items = applyFilters(getActiveItems());
    const start = (state.page - 1) * ITEMS_PER_PAGE;
    const pageItems = items.slice(start, start + ITEMS_PER_PAGE);
    const index = parseInt(itemId.replace(`item-${state.page}-`, ''));
    const item = pageItems[index];

    if (!item || !item.content) {
        alert('该资讯暂无全文内容，无法生成摘要');
        return;
    }

    // Update button state
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> 生成中...';

    try {
        const response = await fetch('/api/summarize', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: item.title,
                content: item.content
            })
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.summary) {
            state.generatedSummaries.set(itemId, data.summary);
            render();
        } else {
            throw new Error('No summary returned');
        }

    } catch (error) {
        console.error('Failed to generate summary:', error);
        alert('生成摘要失败，请稍后重试');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-magic"></i> LLM生成摘要';
    }
}

function renderPagination(totalPages) {

    const container =
        document.getElementById("pagination");

    if (totalPages <= 1) {
        container.innerHTML = "";
        return;
    }

    let html = "";

    for (
        let page = 1;
        page <= totalPages;
        page++
    ) {

        html += `
            <button
                class="page-btn
                ${page === state.page ? "active" : ""}"
                data-page="${page}">
                ${page}
            </button>
        `;
    }

    container.innerHTML = html;

    container.querySelectorAll(".page-btn")
        .forEach(btn => {

            btn.addEventListener("click", () => {

                state.page =
                    Number(btn.dataset.page);

                render();

                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });

            });

        });
}

function render() {

    const items =
        applyFilters(getActiveItems());

    const totalItems = items.length;

    const totalPages =
        Math.max(
            1,
            Math.ceil(totalItems / ITEMS_PER_PAGE)
        );

    const start =
        (state.page - 1) * ITEMS_PER_PAGE;

    const pageItems =
        items.slice(
            start,
            start + ITEMS_PER_PAGE
        );

    document.getElementById(
        "total-count"
    ).textContent = totalItems;

    const list =
        document.getElementById("news-list");

    if (!pageItems.length) {

        list.innerHTML = `
            <div class="empty">
                暂无数据
            </div>
        `;

    } else {

        list.innerHTML =
            pageItems.map((item, index) => renderItem(item, index)).join("");

        // Bind event listeners for dynamic content
        bindContentEvents();
    }

    renderPagination(totalPages);
}

async function loadData() {

    const [
        manifestRes,
        allRes,
        filteredRes
    ] = await Promise.all([
        fetch("./data/manifest.json"),
        fetch("./data/all.json"),
        fetch("./data/filtered.json")
    ]);

    state.manifest =
        await manifestRes.json();

    state.datasets.all =
        await allRes.json();

    state.datasets.filtered =
        await filteredRes.json();

    document.getElementById(
        "updated-at"
    ).textContent =
        "最后更新：" +
        formatUpdatedAt(
            state.manifest.generated_at
        );

    populateSidebar(getActiveItems());

    populateSourceSelect(getActiveItems());

    render();
}

document.getElementById("query-input")
    .addEventListener("input", e => {

        state.filters.query = e.target.value;

        state.page = 1;

        render();
    });

document.getElementById("source-select")
    .addEventListener("change", e => {

        state.filters.source = e.target.value;

        state.page = 1;

        render();
    });

loadData();

</script>

</body>
</html>
